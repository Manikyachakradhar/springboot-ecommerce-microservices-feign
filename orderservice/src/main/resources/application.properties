spring.application.name=order-service
spring.datasource.url=jdbc:postgresql://localhost:5432/orderservice_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8082
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

resilience4j.circuitbreaker.instances.checkoutService.sliding-window-size=5
resilience4j.circuitbreaker.instances.checkoutService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.checkoutService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.checkoutService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.checkoutService.register-health-indicator=true

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
logging.level.io.github.resilience4j.circuitbreaker=DEBUG
